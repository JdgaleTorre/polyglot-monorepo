# https://moonrepo.dev/docs/config/project
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

tasks:
  dev:
    command: 'pnpm'
    args: ['exec', 'vite']
    preset: 'server'

  build:
    script: 'pnpm exec tsc -b && pnpm exec vite build'
    inputs:
      - 'src/**/*'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig.json'
    outputs:
      - 'dist'

  test:
    command: 'pnpm'
    args: ['exec', 'vitest', 'run']
    inputs:
      - 'src/**/*'

  lint:
    command: 'pnpm'
    args: ['exec', 'eslint', '.']
